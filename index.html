<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Premier League Table</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        text-align: center;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }
      th {
        background-color: #f4f4f4;
      }
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      .highlight {
        background-color: #ffd190;
      }
      form {
        margin-bottom: 20px;
        text-align: center;
      }
      select,
      button {
        padding: 8px;
        font-size: 16px;
        margin: 5px;
      }
    </style>
  </head>
  <body>
    <h1>FPL Head-to-Head League Matches</h1>

    <!-- Form to select event and league -->
    <form id="selectionForm">
      <label for="eventSelect">Select Event:</label>
      <select id="eventSelect">
        <option value="5">Event 5</option>
        <option value="6">Event 6</option>
        <option value="7">Event 7</option>
        <option value="8">Event 8</option>
        <option value="9">Event 9</option>
        <option value="10">Event 10</option>
        <option value="11">Event 11</option>
        <option value="12">Event 12</option>
        <option value="13">Event 13</option>
        <option value="14">Event 14</option>
        <option value="15">Event 15</option>
        <option value="16">Event 16</option>
        <option value="17">Event 17</option>
        <option value="18">Event 18</option>
        <option value="19">Event 19</option>
        <option value="20">Event 20</option>
        <option value="21">Event 21</option>
        <option value="22">Event 22</option>
        <option value="23">Event 23</option>
        <option value="24">Event 24</option>
      </select>

      <label for="leagueSelect">Select League:</label>
      <select id="leagueSelect">
        <option value="2272990">League 1</option>
        <option value="2309762">League 2</option>
      </select>

      <button type="button" id="applyFilters">Apply</button>
    </form>

    <table id="matchTable">
      <thead>
        <tr>
          <th>GWK</th>
          <th>Entry 1 Name</th>
          <th>Entry 1 Points</th>
          <th>Entry 2 Points</th>
          <th>Entry 2 Name</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be dynamically inserted here -->
      </tbody>
    </table>
    <button id="nextPage">Next Page</button>

    <script>
      var currentPage = 1;
      var currentEvent = 10; // Default event
      var currentLeague = 2272990; // Default league

      // Function to fetch data
      function fetchData() {
        var baseUrl = `https://fantasy.premierleague.com/api/leagues-h2h-matches/league/${currentLeague}/?page=${currentPage}&event=${currentEvent}`;
        var encodedUrl = encodeURIComponent(baseUrl);
        var proxyUrl = `https://stat-app.onrender.com/proxy?url=${encodedUrl}`;
        var xhr = new XMLHttpRequest();

        xhr.open("GET", proxyUrl, true);
        xhr.onload = function () {
          if (xhr.status === 200) {
            var response = JSON.parse(xhr.responseText);
            if (response.results) {
              renderTable(response.results);
            } else {
              console.error("No results found in response.");
            }
          } else {
            console.error("Failed to fetch data:", xhr.statusText);
          }
        };
        xhr.send();
      }

      // Function to render the table
      function renderTable(results) {
        var tableBody = document.querySelector("#matchTable tbody");
        tableBody.innerHTML = ""; // Clear the table for new data

        for (var i = 0; i < results.length; i++) {
          var match = results[i];
          var row = document.createElement("tr");

          // GWK column (event key)
          var gwkCell = document.createElement("td");
          gwkCell.textContent = "GWK " + match.event;
          row.appendChild(gwkCell);

          // Entry 1 Name
          var entry1NameCell = document.createElement("td");
          entry1NameCell.textContent = match.entry_1_name || "N/A";
          row.appendChild(entry1NameCell);

          // Entry 1 Points
          var entry1PointsCell = document.createElement("td");
          entry1PointsCell.textContent = match.entry_1_points || 0;
          row.appendChild(entry1PointsCell);

          // Entry 2 Points
          var entry2PointsCell = document.createElement("td");
          entry2PointsCell.textContent = match.entry_2_points || 0;
          row.appendChild(entry2PointsCell);

          // Entry 2 Name
          var entry2NameCell = document.createElement("td");
          entry2NameCell.textContent = match.entry_2_name || "N/A";
          row.appendChild(entry2NameCell);

          // Highlight the winner
          if (match.entry_1_points > match.entry_2_points) {
            entry1PointsCell.classList.add("highlight");
          } else if (match.entry_2_points > match.entry_1_points) {
            entry2PointsCell.classList.add("highlight");
          }

          tableBody.appendChild(row);
        }
      }

      // Event listener for the form
      document
        .getElementById("applyFilters")
        .addEventListener("click", function () {
          var eventSelect = document.getElementById("eventSelect");
          var leagueSelect = document.getElementById("leagueSelect");

          currentEvent = eventSelect.value;
          currentLeague = leagueSelect.value;
          currentPage = 1; // Reset to the first page
          fetchData();
        });

      // Event listener for the "Next Page" button
      document
        .getElementById("nextPage")
        .addEventListener("click", function () {
          currentPage++;
          fetchData();
        });

      // Fetch initial data
      fetchData();
    </script>
  </body>
</html>
