<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Premier League Table</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 16px;
        text-align: center;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }
      th {
        background-color: #f4f4f4;
      }
      tr:nth-child(even) {
        background-color: #f9f9f9;
      }
      .highlight {
        background-color: #ffd190;
      }
    </style>
  </head>
  <body>
    <h1>FPL Head-to-Head League Matches</h1>
    <table id="matchTable">
      <thead>
        <tr>
          <th>GWK</th>
          <th>Entry 1 Name</th>
          <th>Entry 1 Points</th>
          <th>Entry 2 Points</th>
          <th>Entry 2 Name</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be dynamically inserted here -->
      </tbody>
    </table>
    <button id="nextPage">Next Page</button>

    <script>
      // Current state variables
      var currentPage = 1;
      var currentEvent = 10; // Replace with the desired event
      var currentLeague = 2272990; // Replace with the desired league ID

      // Fetch and render data
      function fetchData() {
        var url = `https://stat-app.onrender.com/proxy?url=https://fantasy.premierleague.com/api/leagues-h2h-matches/league/${currentLeague}/?page=${currentPage}&event=${currentEvent}`;
        var xhr = new XMLHttpRequest();

        xhr.open("GET", url, true);
        xhr.onload = function () {
          if (xhr.status === 200) {
            var response = JSON.parse(xhr.responseText);
            if (response.results) {
              renderTable(response.results);
            } else {
              console.error("No results found in response.");
            }
          } else {
            console.error("Failed to fetch data:", xhr.statusText);
          }
        };
        xhr.send();
      }

      // Render table data
      function renderTable(results) {
        var tableBody = document.querySelector("#matchTable tbody");
        tableBody.innerHTML = ""; // Clear the table for new data

        for (var i = 0; i < results.length; i++) {
          var match = results[i];
          var row = document.createElement("tr");

          // Add GWK column (from event key of the current match)
          var gwkCell = document.createElement("td");
          gwkCell.textContent = "GWK " + match.event;
          row.appendChild(gwkCell);

          // Entry 1 Name
          var entry1NameCell = document.createElement("td");
          entry1NameCell.textContent = match.entry_1_name || "N/A";
          row.appendChild(entry1NameCell);

          // Entry 1 Points
          var entry1PointsCell = document.createElement("td");
          entry1PointsCell.textContent = match.entry_1_points || 0;
          row.appendChild(entry1PointsCell);

          // Entry 2 Points
          var entry2PointsCell = document.createElement("td");
          entry2PointsCell.textContent = match.entry_2_points || 0;
          row.appendChild(entry2PointsCell);

          // Entry 2 Name
          var entry2NameCell = document.createElement("td");
          entry2NameCell.textContent = match.entry_2_name || "N/A";
          row.appendChild(entry2NameCell);

          // Highlight the winner
          if (match.entry_1_points > match.entry_2_points) {
            entry1PointsCell.classList.add("highlight");
          } else if (match.entry_2_points > match.entry_1_points) {
            entry2PointsCell.classList.add("highlight");
          }

          tableBody.appendChild(row);
        }
      }

      // Event listener for the "Next Page" button
      document
        .getElementById("nextPage")
        .addEventListener("click", function () {
          currentPage++;
          fetchData();
        });

      // Initial data fetch
      fetchData();
    </script>
  </body>
</html>
