<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fantasy Premier League Table</title>
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        font-size: 16px;
        text-align: center;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
      }

      th {
        background-color: #f4f4f4;
      }

      tr:nth-child(even) {
        background-color: #f9f9f9;
      }

      .highlight {
        background-color: #ffd190;
      }

      .center {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>FPL Head-to-Head League Matches</h1>
    <table id="matchTable">
      <thead>
        <tr>
          <th>GWK</th>
          <th>Entry 1 Name</th>
          <th>Entry 1 Points</th>
          <th>Entry 2 Points</th>
          <th>Entry 2 Name</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be dynamically inserted here -->
      </tbody>
    </table>
    <button id="nextPage">Next Page</button>

    <script>
      let currentPage = 1;
      const currentLeague = 2272990; // Use one league for simplicity

      function fetchData() {
        const url = `https://stat-app.onrender.com/proxy?url=https://fantasy.premierleague.com/api/leagues-h2h-matches/league/${currentLeague}/?page=${currentPage}`;

        const xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);
        xhr.onload = function () {
          if (xhr.status === 200) {
            const response = JSON.parse(xhr.responseText);
            if (response.results) {
              renderTable(response.results, response.event);
            } else {
              console.error("No results found in response.");
            }
          } else {
            console.error("Failed to fetch data:", xhr.statusText);
          }
        };
        xhr.onerror = function () {
          console.error("Network error occurred.");
        };
        xhr.send();
      }

      function renderTable(results, event) {
        const tableBody = document.querySelector("#matchTable tbody");
        tableBody.innerHTML = ""; // Clear the table for new data

        results.forEach((match) => {
          const row = document.createElement("tr");

          // GWK Cell
          const gwkCell = document.createElement("td");
          gwkCell.textContent = "GWK " + event; // Use event from the JSON response
          row.appendChild(gwkCell);

          // Entry 1 Name
          const entry1NameCell = document.createElement("td");
          entry1NameCell.textContent = match.entry_1_name || "N/A";
          row.appendChild(entry1NameCell);

          // Entry 1 Points
          const entry1PointsCell = document.createElement("td");
          entry1PointsCell.textContent = match.entry_1_points || 0;
          row.appendChild(entry1PointsCell);

          // Entry 2 Points
          const entry2PointsCell = document.createElement("td");
          entry2PointsCell.textContent = match.entry_2_points || 0;
          row.appendChild(entry2PointsCell);

          // Entry 2 Name
          const entry2NameCell = document.createElement("td");
          entry2NameCell.textContent = match.entry_2_name || "N/A";
          row.appendChild(entry2NameCell);

          // Highlight the winner
          if (match.entry_1_points > match.entry_2_points) {
            entry1PointsCell.classList.add("highlight");
          } else if (match.entry_2_points > match.entry_1_points) {
            entry2PointsCell.classList.add("highlight");
          }

          tableBody.appendChild(row);
        });
      }

      // Next Page Button
      document
        .getElementById("nextPage")
        .addEventListener("click", function () {
          currentPage++;
          fetchData();
        });

      // Fetch initial data
      fetchData();
    </script>
  </body>
</html>
