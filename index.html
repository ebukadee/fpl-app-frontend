<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fetch H2H League Data</title>
    <style>
      table {
        width: 100%;
        text-align: left;
        border-collapse: collapse;
      }
      th,
      td {
        padding: 8px;
        border: 1px solid #ddd;
      }
      tr:nth-child(odd) {
        background-color: #f2f2f2;
      }
      tr:nth-child(even) {
        background-color: #ffffff;
      }
      tr:hover {
        background-color: #ddd;
      }
      th {
        background-color: #161616;
        color: white;
      }
      .highlight {
        background-color: yellow !important;
      }
      select,
      button {
        padding: 8px;
        margin: 8px 0;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <form id="selectionForm">
      <label for="event">Gameweek:</label>
      <select id="event" name="event">
        <option value="11" selected>Gameweek 11</option>
        <option value="13">Gameweek 13</option>
        <option value="14">Gameweek 14</option>
        <option value="15">Gameweek 15</option>
      </select>

      <label for="league">League ID:</label>
      <select id="league" name="league">
        <option value="2272990" selected>League 1</option>
        <option value="2309762">League 2</option>
      </select>

      <button type="button" id="fetchData">Fetch League Data</button>
    </form>

    <table id="dataTable">
      <thead>
        <tr>
          <th>Event</th>
          <th>Entry 1 Name</th>
          <th>Entry 1 Points</th>
          <th>Entry 2 Points</th>
          <th>Entry 2 Name</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div id="playerDetails"></div>

    <script>
      function fetchLeagueData() {
        var eventInput = document.getElementById("event").value;
        var leagueInput = document.getElementById("league").value;

        var proxyUrl = "https://stat-app.onrender.com/proxy?url=";
        var targetUrl =
          "https://fantasy.premierleague.com/api/leagues-h2h-matches/league/" +
          leagueInput +
          "/?page=1&event=" +
          eventInput;

        var fullUrl = proxyUrl + encodeURIComponent(targetUrl);

        var xhr = new XMLHttpRequest();
        xhr.open("GET", fullUrl, true);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              var response = JSON.parse(xhr.responseText);
              renderTable(response.results);
            } else {
              alert("Error fetching data: " + xhr.statusText);
            }
          }
        };

        xhr.onerror = function () {
          alert("Network error occurred.");
        };

        xhr.send();
      }

      function renderTable(results) {
        var tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        for (var i = 0; i < results.length; i++) {
          var match = results[i];
          var row = document.createElement("tr");

          var eventCell = document.createElement("td");
          eventCell.textContent = "GW " + match.event;

          var entry1NameCell = document.createElement("td");
          entry1NameCell.textContent = match.entry_1_name;
          entry1NameCell.onclick = function () {
            fetchPlayerDetails(match.entry_1_entry);
          };

          var entry1PointsCell = document.createElement("td");
          entry1PointsCell.textContent = match.entry_1_points;

          var entry2PointsCell = document.createElement("td");
          entry2PointsCell.textContent = match.entry_2_points;

          var entry2NameCell = document.createElement("td");
          entry2NameCell.textContent = match.entry_2_name;
          entry2NameCell.onclick = function () {
            fetchPlayerDetails(match.entry_2_entry);
          };

          row.appendChild(eventCell);
          row.appendChild(entry1NameCell);
          row.appendChild(entry1PointsCell);
          row.appendChild(entry2PointsCell);
          row.appendChild(entry2NameCell);

          tableBody.appendChild(row);
        }
      }

      function fetchPlayerDetails(playerId) {
        var eventInput = document.getElementById("event").value;

        var proxyUrl = "https://stat-app.onrender.com/proxy?url=";
        var targetUrl =
          "https://fantasy.premierleague.com/api/entry/" +
          playerId +
          "/event/" +
          eventInput +
          "/picks/";

        var fullUrl = proxyUrl + encodeURIComponent(targetUrl);

        var xhr = new XMLHttpRequest();
        xhr.open("GET", fullUrl, true);

        xhr.onreadystatechange = function () {
          if (xhr.readyState === 4) {
            if (xhr.status === 200) {
              var response = JSON.parse(xhr.responseText);
              fetchPlayerNamesAndPoints(response.picks, eventInput);
            } else {
              alert("Error fetching player details: " + xhr.statusText);
            }
          }
        };

        xhr.onerror = function () {
          alert("Network error occurred.");
        };

        xhr.send();
      }

      function fetchPlayerNamesAndPoints(picks, eventInput) {
        var proxyUrl = "https://stat-app.onrender.com/proxy?url=";
        var namesUrl = "https://www.livefpl.net/static3/players.json";
        var pointsUrl =
          "https://www.livefpl.net/static3/calc_" + eventInput + ".json";

        var namesFullUrl = proxyUrl + encodeURIComponent(namesUrl);
        var pointsFullUrl = proxyUrl + encodeURIComponent(pointsUrl);

        var xhrNames = new XMLHttpRequest();
        var xhrPoints = new XMLHttpRequest();

        xhrNames.open("GET", namesFullUrl, true);
        xhrPoints.open("GET", pointsFullUrl, true);

        xhrNames.onreadystatechange = function () {
          if (xhrNames.readyState === 4 && xhrNames.status === 200) {
            var playerNames = JSON.parse(xhrNames.responseText);

            xhrPoints.onreadystatechange = function () {
              if (xhrPoints.readyState === 4 && xhrPoints.status === 200) {
                var playerPoints = JSON.parse(xhrPoints.responseText);
                renderPlayerDetailsWithPoints(picks, playerNames, playerPoints);
              }
            };

            xhrPoints.send();
          }
        };

        xhrNames.send();
      }

      function renderPlayerDetailsWithPoints(picks, playerNames, playerPoints) {
        var playerDetails = document.getElementById("playerDetails");
        playerDetails.innerHTML = "<h3>Player Details</h3>";

        var detailsTable =
          "<table><tr><th>Name</th><th>Position</th><th>Multiplier</th><th>Points</th></tr>";

        for (var i = 0; i < picks.length; i++) {
          var element = picks[i].element;
          var name = playerNames[element] || "Unknown";
          var position = picks[i].position;
          var multiplier = picks[i].multiplier;
          var basePoints = playerPoints[element] || 0;
          var totalPoints = basePoints * multiplier;

          detailsTable +=
            "<tr><td>" +
            name +
            "</td><td>" +
            position +
            "</td><td>" +
            multiplier +
            "</td><td>" +
            totalPoints +
            "</td></tr>";
        }

        detailsTable += "</table>";
        playerDetails.innerHTML = detailsTable;
      }

      document
        .getElementById("fetchData")
        .addEventListener("click", fetchLeagueData);
    </script>
  </body>
</html>
